<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Poker EV Trainer</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a2129;
    --text: #e8eaed;
    --sub: #8b949e;
    --green: #2ea44f;
    --red: #d9534f;
    --blue: #58a6ff;
    --border: #2d3640;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  .app { width: 100%; max-width: 420px; }
  h1 { font-size: 18px; text-align: center; padding: 8px 0 4px; }
  .score-bar {
    display: flex;
    justify-content: space-around;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    margin: 12px 0;
    font-size: 13px;
    color: var(--sub);
  }
  .score-bar b { color: var(--text); font-size: 17px; display: block; text-align: center; }
  .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .tabs button {
    flex: 1;
    padding: 12px 2px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--sub);
  }
  .tabs button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .spot {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-bottom: 12px;
  }
  .spot .row { display: flex; justify-content: space-around; }
  .spot .label { font-size: 12px; color: var(--sub); }
  .spot .value { font-size: 26px; font-weight: 700; margin-top: 2px; }
  .winrate { margin-top: 14px; font-size: 15px; color: var(--sub); }
  .winrate b { font-size: 24px; color: var(--blue); }
  .street-badge {
    display: inline-block;
    background: var(--blue);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    border-radius: 6px;
    padding: 3px 10px;
    margin-bottom: 8px;
  }
  .cards-label { font-size: 12px; color: var(--sub); margin-top: 6px; }
  .cards { display: flex; gap: 6px; justify-content: center; margin: 6px 0 4px; }
  .cardc {
    background: #fff;
    color: #1a1a1a;
    border-radius: 8px;
    padding: 10px 4px;
    font-size: 19px;
    font-weight: 700;
    min-width: 46px;
    text-align: center;
  }
  .cardc.red { color: #d23b3b; }
  .question { text-align: center; font-size: 15px; margin-bottom: 10px; color: var(--sub); }
  .choices { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .choices.two { grid-template-columns: 1fr 1fr; }
  .choices.four { grid-template-columns: 1fr 1fr; }
  .choices button {
    padding: 18px 4px;
    font-size: 18px;
    font-weight: 700;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--card);
    color: var(--text);
  }
  .choices button:active { background: var(--border); }
  .choices button.call { background: var(--green); border-color: var(--green); color: #fff; font-size: 22px; }
  .choices button.fold { background: var(--red); border-color: var(--red); color: #fff; font-size: 22px; }
  .feedback {
    min-height: 76px;
    margin-top: 14px;
    text-align: center;
    border-radius: 12px;
    padding: 12px;
    font-size: 15px;
    line-height: 1.6;
  }
  .feedback.ok { background: rgba(46,164,79,.15); border: 1px solid var(--green); }
  .feedback.ng { background: rgba(217,83,79,.15); border: 1px solid var(--red); }
  .feedback .big { font-size: 20px; font-weight: 700; }
  .feedback .note { font-size: 12px; color: var(--sub); }
  .next-hint { text-align: center; color: var(--sub); font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
<div class="app">
  <h1>♠ Poker EV Trainer</h1>

  <div class="score-bar">
    <div>正解<b id="score">0/0</b></div>
    <div>連続<b id="streak">0</b></div>
    <div>最高連続<b id="best">0</b></div>
  </div>

  <div class="tabs">
    <button id="tab-rate" class="active">必要勝率</button>
    <button id="tab-cf">CALL/FOLD</button>
    <button id="tab-outs">勝率(アウツ)</button>
  </div>

  <div class="spot">
    <div class="row" id="pot-row">
      <div><div class="label">ポット</div><div class="value" id="pot">-</div></div>
      <div><div class="label">相手ベット</div><div class="value" id="bet">-</div></div>
      <div><div class="label">コール額</div><div class="value" id="call">-</div></div>
    </div>
    <div class="winrate" id="winrate-box" style="display:none">
      自分の勝率 <b id="winrate">-</b>%
    </div>
    <div id="card-area" style="display:none">
      <div class="street-badge" id="street">フロップ</div>
      <div class="cards-label">あなたの手札</div>
      <div class="cards" id="hand-cards"></div>
      <div class="cards-label">ボード</div>
      <div class="cards" id="board-cards"></div>
    </div>
  </div>

  <div class="question" id="question">必要勝率はどれ?</div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <div class="next-hint" id="next-hint"></div>
</div>

<script>
const BET_SIZES = [0.33, 0.5, 0.66, 0.75, 1.0, 1.5];
const POTS = [40, 60, 80, 100, 120, 150, 200, 300];
const RATE_CHOICES = [20, 25, 28.5, 30, 33.3, 37.5];

// アウツクイズの局面集（turn はアウツを変えないブリックカード）
const OUTS_SET = [2, 4, 6, 8, 9, 12, 15];
const SCENARIOS = [
  { name: "フラッシュドロー", hand: ["A♥", "7♥"], flop: ["K♥", "9♥", "2♣"], turn: "4♣",
    outs: 9, expl: "ハートはあと9枚（13−4）" },
  { name: "オープンエンド", hand: ["9♠", "8♦"], flop: ["7♣", "6♥", "2♠"], turn: "K♣",
    outs: 8, expl: "5か10、どちらでもストレート（4枚+4枚）" },
  { name: "ガットショット", hand: ["J♠", "10♦"], flop: ["8♣", "7♥", "2♠"], turn: "3♦",
    outs: 4, expl: "9（4枚）だけでストレート完成" },
  { name: "オーバーカード2枚", hand: ["A♠", "K♦"], flop: ["9♣", "6♥", "2♠"], turn: "3♦",
    outs: 6, expl: "AかKを引けばトップペア（3枚+3枚）" },
  { name: "フラドロ+ガットショット", hand: ["J♥", "10♥"], flop: ["8♥", "7♣", "2♥"], turn: "3♣",
    outs: 12, expl: "ハート9枚 + 9が4枚 − 重複の9♥ = 12枚" },
  { name: "コンボドロー", hand: ["9♥", "8♥"], flop: ["7♥", "6♣", "2♥"], turn: "K♦",
    outs: 15, expl: "ハート9枚 + 5と10で8枚 − 重複2枚 = 15枚" },
  { name: "ポケットペア（セット狙い)", hand: ["5♠", "5♦"], flop: ["A♣", "K♥", "9♠"], turn: "7♥",
    outs: 2, expl: "残りの5は2枚だけ" },
];
// アウツが多い時、×4ルールは実際よりやや高く出る
const FLOP_ACTUAL = { 12: 45, 15: 54 };

let mode = "rate";          // "rate" / "cf" / "outs"
let spot = null;
let answered = false;
let correct = 0, total = 0, streak = 0;
let best = Number(localStorage.getItem("pokerBestStreak") || 0);

const $ = id => document.getElementById(id);

function requiredRate(pot, bet, call) {
  return call / (pot + bet + call) * 100;
}
function calcEV(pot, bet, call, winPct) {
  const w = winPct / 100;
  return w * (pot + bet) - (1 - w) * call;
}
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function newSpot() {
  answered = false;
  if (mode === "outs") {
    spot = { sc: pick(SCENARIOS), street: pick(["flop", "turn"]), stage: 1 };
  } else {
    const pot = pick(POTS);
    const size = pick(BET_SIZES);
    const bet = Math.round(pot * size);
    const call = bet;
    const required = requiredRate(pot, bet, call);
    let winPct = null;
    if (mode === "cf") {
      winPct = Math.round(required + (Math.random() * 24 - 12));
      winPct = Math.max(5, Math.min(95, winPct));
    }
    spot = { pot, bet, call, required, winPct };
  }
  render();
}

function cardHTML(c) {
  const suit = c.slice(-1);
  const red = (suit === "♥" || suit === "♦") ? " red" : "";
  return `<div class="cardc${red}">${c}</div>`;
}

function makeButton(label, onTap) {
  const b = document.createElement("button");
  b.textContent = label;
  b.onclick = onTap;
  return b;
}

function render() {
  $("feedback").className = "feedback";
  $("feedback").innerHTML = "";
  $("next-hint").textContent = "";
  const choices = $("choices");
  choices.innerHTML = "";

  const isOuts = mode === "outs";
  $("pot-row").style.display = isOuts ? "none" : "flex";
  $("card-area").style.display = isOuts ? "block" : "none";
  $("winrate-box").style.display = (mode === "cf") ? "block" : "none";

  if (mode === "rate") {
    $("pot").textContent = spot.pot;
    $("bet").textContent = spot.bet;
    $("call").textContent = spot.call;
    $("question").textContent = "必要勝率はどれ?";
    choices.className = "choices";
    RATE_CHOICES.forEach(r => choices.appendChild(makeButton(r + "%", () => answerRate(r))));

  } else if (mode === "cf") {
    $("pot").textContent = spot.pot;
    $("bet").textContent = spot.bet;
    $("call").textContent = spot.call;
    $("winrate").textContent = spot.winPct;
    $("question").textContent = "コールすべき?";
    choices.className = "choices two";
    const c = makeButton("CALL", () => answerCF(true));
    c.className = "call";
    const f = makeButton("FOLD", () => answerCF(false));
    f.className = "fold";
    choices.appendChild(c);
    choices.appendChild(f);

  } else {
    const sc = spot.sc;
    $("street").textContent = spot.street === "flop" ? "フロップ" : "ターン";
    $("hand-cards").innerHTML = sc.hand.map(cardHTML).join("");
    const board = spot.street === "flop" ? sc.flop : sc.flop.concat([sc.turn]);
    $("board-cards").innerHTML = board.map(cardHTML).join("");

    if (spot.stage === 1) {
      $("question").textContent = "アウツ（勝ちにつながるカード）は何枚?";
      choices.className = "choices";
      OUTS_SET.forEach(o => choices.appendChild(makeButton(o + "枚", () => answerOuts(o))));
    } else {
      const left = spot.street === "flop" ? "リバーまで（あと2枚）見る場合" : "リバー1枚で";
      $("question").textContent = left + "、勝率は約何%?";
      choices.className = "choices four";
      rateOptions().forEach(r => choices.appendChild(makeButton("約" + r + "%", () => answerOutsRate(r))));
    }
  }
}

function rateOptions() {
  const mult = spot.street === "flop" ? 4 : 2;
  const i = OUTS_SET.indexOf(spot.sc.outs);
  const start = Math.min(Math.max(0, i - 1), OUTS_SET.length - 4);
  return OUTS_SET.slice(start, start + 4).map(o => o * mult);
}

function updateScore(isCorrect) {
  total += 1;
  if (isCorrect) {
    correct += 1;
    streak += 1;
    if (streak > best) {
      best = streak;
      localStorage.setItem("pokerBestStreak", best);
    }
  } else {
    streak = 0;
  }
  $("score").textContent = correct + "/" + total;
  $("streak").textContent = streak;
  $("best").textContent = best;
}

function showFeedback(isCorrect, html, hint) {
  const fb = $("feedback");
  fb.className = "feedback " + (isCorrect ? "ok" : "ng");
  fb.innerHTML = html;
  $("next-hint").textContent = hint || "タップで次の問題へ";
  answered = true;
}

function answerRate(guess) {
  if (answered) return;
  const ans = spot.required;
  const isCorrect = Math.abs(guess - ans) <= 3;
  updateScore(isCorrect);
  const mark = isCorrect ? "○ 正解!" : "× ざんねん";
  showFeedback(isCorrect,
    `<div class="big">${mark}</div>必要勝率は ${ans.toFixed(1)}%<br>` +
    `(ベットはポットの${Math.round(spot.bet / spot.pot * 100)}%)`);
}

function answerCF(calledIt) {
  if (answered) return;
  const ev = calcEV(spot.pot, spot.bet, spot.call, spot.winPct);
  const shouldCall = ev >= 0;
  const isCorrect = calledIt === shouldCall;
  updateScore(isCorrect);
  const mark = isCorrect ? "○ 正解!" : "× ざんねん";
  const label = shouldCall ? "CALL" : "FOLD";
  showFeedback(isCorrect,
    `<div class="big">${mark} 正解は ${label}</div>` +
    `必要勝率 ${spot.required.toFixed(1)}% / あなたの勝率 ${spot.winPct}%<br>` +
    `EV ${ev >= 0 ? "+" : ""}${ev.toFixed(1)}`);
}

function answerOuts(guess) {
  if (answered) return;
  const sc = spot.sc;
  const isCorrect = guess === sc.outs;
  updateScore(isCorrect);
  const mark = isCorrect ? "○ 正解!" : "× ざんねん";
  showFeedback(isCorrect,
    `<div class="big">${mark} アウツは ${sc.outs}枚</div>${sc.name}: ${sc.expl}`,
    "タップして勝率の問題へ");
}

function answerOutsRate(guess) {
  if (answered) return;
  const mult = spot.street === "flop" ? 4 : 2;
  const ans = spot.sc.outs * mult;
  const isCorrect = guess === ans;
  updateScore(isCorrect);
  const mark = isCorrect ? "○ 正解!" : "× ざんねん";
  let note = "";
  if (spot.street === "flop" && FLOP_ACTUAL[spot.sc.outs]) {
    note = `<br><span class="note">※アウツが多い時の×4は少し高めに出ます（正確には約${FLOP_ACTUAL[spot.sc.outs]}%）</span>`;
  }
  showFeedback(isCorrect,
    `<div class="big">${mark} 約${ans}%</div>` +
    `アウツ ${spot.sc.outs}枚 × ${mult} = ${ans}%${note}`);
}

// 回答後は画面タップで進む（ボタン上のタップは除く）
document.body.addEventListener("click", (e) => {
  if (e.target.closest("button")) return;
  if (!answered) return;
  if (mode === "outs" && spot.stage === 1) {
    spot.stage = 2;
    answered = false;
    render();
  } else {
    newSpot();
  }
});

function setMode(m) {
  mode = m;
  ["rate", "cf", "outs"].forEach(t => {
    $("tab-" + t).classList.toggle("active", t === m);
  });
  newSpot();
}
$("tab-rate").onclick = () => setMode("rate");
$("tab-cf").onclick = () => setMode("cf");
$("tab-outs").onclick = () => setMode("outs");

$("best").textContent = best;
newSpot();
</script>
</body>
</html>
